# Copy to /etc/bootstrap-server.conf and replace placeholders.

INSTALL_WIREGUARD=true
WIREGUARD_MODE="client"

WIREGUARD_CLIENT_ADDRESS="10.77.0.10/32"
WIREGUARD_PRIVATE_KEY="replace-with-client-private-key"

WIREGUARD_CLIENT_SERVER_PUBLIC_KEY="replace-with-server-public-key"
WIREGUARD_CLIENT_PRESHARED_KEY="replace-with-preshared-key"
WIREGUARD_CLIENT_ENDPOINT="bastion.landistack.ru:443"
WIREGUARD_CLIENT_ALLOWED_IPS=("10.77.0.1/32")
WIREGUARD_CLIENT_PERSISTENT_KEEPALIVE="25"

# Set to true if the tunnel should start immediately and on boot.
WIREGUARD_AUTO_UP=false
